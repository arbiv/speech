<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק הפעלים של נועה ויונתן</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #f0fdf4;
            user-select: none;
            -webkit-user-select: none;
        }
        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-50px); }
        }
        .anim-jump { animation: jump 0.8s ease-in-out infinite; }
        @keyframes eat-arm {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-55deg); }
        }
        .anim-eat-arm { animation: eat-arm 0.7s ease-in-out infinite; transform-origin: 55px 58px; }
        @keyframes read-book {
            0%, 100% { transform: rotate(-4deg) translateY(0); }
            50% { transform: rotate(4deg) translateY(-4px); }
        }
        .anim-read { animation: read-book 1.2s ease-in-out infinite; transform-origin: center; }
        @keyframes think-bubble {
            0%, 100% { transform: scale(0.92) translateY(0); opacity: 0.75; }
            50% { transform: scale(1.06) translateY(-6px); opacity: 1; }
        }
        .anim-think-bubble { animation: think-bubble 1.8s ease-in-out infinite; }
        @keyframes throw-arm {
            0% { transform: rotate(0deg); }
            30% { transform: rotate(-80deg); }
            55% { transform: rotate(35deg); }
            100% { transform: rotate(0deg); }
        }
        .anim-throw-arm { animation: throw-arm 1.1s ease-in-out infinite; transform-origin: 55px 58px; }
        @keyframes ball-fly {
            0%, 28% { transform: translate(0,0); opacity: 0; }
            35% { opacity: 1; }
            75% { transform: translate(-110px,-55px); opacity: 0; }
            100% { transform: translate(0,0); opacity: 0; }
        }
        .anim-ball { animation: ball-fly 1.1s ease-in-out infinite; }
        @keyframes scissors-cut {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-28deg); }
        }
        .anim-scissors { animation: scissors-cut 0.5s ease-in-out infinite; transform-origin: center; }
        .answer-btn { transition: transform 0.12s, box-shadow 0.12s; }
        .answer-btn:hover { transform: scale(1.04); }
        .answer-btn.correct { background-color: #16a34a !important; color: white !important; border-color: #16a34a !important; }
        .answer-btn.wrong   { background-color: #dc2626 !important; color: white !important; border-color: #dc2626 !important; }
        @keyframes pop-in {
            0%   { transform: scale(0) rotate(-15deg); }
            70%  { transform: scale(1.2) rotate(5deg); }
            100% { transform: scale(1) rotate(0); }
        }
        .pop-in { animation: pop-in 0.35s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-lg text-center mt-4 mb-4">
        <a href="../index.html" class="text-green-600 text-sm hover:underline">← חזרה לרשימת המשחקים</a>
        <h1 class="text-3xl font-extrabold text-green-800 mt-1">משחק הפעלים 🎮</h1>
        <p class="text-green-600">של נועה ויונתן</p>
    </div>

    <div class="w-full max-w-lg flex justify-between items-center bg-white rounded-2xl shadow px-6 py-3 mb-5">
        <div class="text-center">
            <div class="text-2xl font-extrabold text-green-600" id="score">0</div>
            <div class="text-xs text-gray-400">נכון ✅</div>
        </div>
        <div class="text-lg font-bold text-gray-400" id="q-label">שאלה 1 / 10</div>
        <div class="text-center">
            <div class="text-2xl font-extrabold text-red-400" id="wrongs">0</div>
            <div class="text-xs text-gray-400">טעות ❌</div>
        </div>
    </div>

    <div class="w-full max-w-lg bg-white rounded-3xl shadow-lg flex items-center justify-center mb-5" style="height:230px;">
        <div id="scene" style="position:relative;"></div>
    </div>

    <div class="w-full max-w-lg grid grid-cols-2 gap-3" id="choices"></div>

    <div id="overlay" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-3xl p-8 text-center shadow-2xl max-w-sm w-full mx-4">
            <div class="text-6xl mb-3" id="ov-emoji">🏆</div>
            <h2 class="text-3xl font-extrabold text-green-700 mb-1" id="ov-title">כל הכבוד!</h2>
            <p class="text-gray-500 mb-2" id="ov-msg"></p>
            <div class="text-2xl font-bold text-green-600 mb-6" id="ov-score"></div>
            <button onclick="restart()" class="bg-green-500 hover:bg-green-600 text-white text-xl font-bold py-3 px-8 rounded-2xl transition">שחק שוב 🔄</button>
        </div>
    </div>

<script>
const TOTAL = 10;
const VERBS = [
  { id:'jump',  label:'קופץ',  draw: drawJump  },
  { id:'eat',   label:'אוכל',  draw: drawEat   },
  { id:'read',  label:'קורא',  draw: drawRead  },
  { id:'think', label:'חושב',  draw: drawThink },
  { id:'throw', label:'זורק',  draw: drawThrow },
  { id:'cut',   label:'גוזר',  draw: drawCut   },
  { id:'sit',   label:'יושב',  draw: drawSit   },
];

const ns = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs) {
    const el = document.createElementNS(ns, tag);
    for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
}
function makeSVG(w, h) { return svgEl('svg', { viewBox:`0 0 ${w} ${h}`, width:w, height:h }); }

function baseChar(w=110, h=160, cx=55) {
    const svg = makeSVG(w, h);
    svg.append(svgEl('circle',{cx, cy:22, r:18, fill:'#FBBF24', stroke:'#92400E', 'stroke-width':2}));
    svg.append(svgEl('circle',{cx:cx-6, cy:19, r:2.5, fill:'#1F2937'}));
    svg.append(svgEl('circle',{cx:cx+6, cy:19, r:2.5, fill:'#1F2937'}));
    svg.append(svgEl('path',  {d:`M ${cx-7} 28 Q ${cx} 34 ${cx+7} 28`, stroke:'#92400E','stroke-width':1.5,fill:'none','stroke-linecap':'round'}));
    svg.append(svgEl('line',  {x1:cx, y1:40, x2:cx, y2:95, stroke:'#3B82F6','stroke-width':5,'stroke-linecap':'round'}));
    const la = svgEl('line',  {x1:cx, y1:55, x2:cx-25, y2:75, stroke:'#3B82F6','stroke-width':4,'stroke-linecap':'round'});
    svg.append(la);
    const raG = svgEl('g', {});
    const ra  = svgEl('line', {x1:cx, y1:55, x2:cx+25, y2:75, stroke:'#3B82F6','stroke-width':4,'stroke-linecap':'round'});
    raG.append(ra);
    svg.append(raG);
    svg.append(svgEl('line',  {x1:cx, y1:95, x2:cx-18, y2:138, stroke:'#1D4ED8','stroke-width':4,'stroke-linecap':'round'}));
    svg.append(svgEl('line',  {x1:cx, y1:95, x2:cx+18, y2:138, stroke:'#1D4ED8','stroke-width':4,'stroke-linecap':'round'}));
    svg.append(svgEl('ellipse',{cx:cx-21, cy:141, rx:8, ry:4, fill:'#1F2937'}));
    svg.append(svgEl('ellipse',{cx:cx+21, cy:141, rx:8, ry:4, fill:'#1F2937'}));
    return { svg, la, raG, ra };
}

function drawJump(scene) {
    const big = makeSVG(160, 175);
    const { svg } = baseChar(110, 160, 55);
    svg.setAttribute('class', 'anim-jump');
    svg.setAttribute('x', 25);
    big.append(svg);
    big.append(svgEl('line',{x1:10,y1:162,x2:150,y2:162,stroke:'#4ADE80','stroke-width':3,'stroke-linecap':'round'}));
    scene.appendChild(big);
}
function drawEat(scene) {
    const big = makeSVG(140, 170);
    const { svg, raG } = baseChar();
    raG.setAttribute('class', 'anim-eat-arm');
    raG.append(svgEl('circle',{cx:80, cy:72, r:11, fill:'#EF4444'}));
    raG.append(svgEl('path',  {d:'M 80 61 Q 87 55 90 60', stroke:'#22C55E','stroke-width':2,fill:'none'}));
    big.append(svg);
    scene.appendChild(big);
}
function drawRead(scene) {
    const big = makeSVG(150, 175);
    const { svg, la, raG } = baseChar(110, 155);
    la.setAttribute('x2', 30); la.setAttribute('y2', 82);
    raG.querySelector('line').setAttribute('x2', 80);
    raG.querySelector('line').setAttribute('y2', 82);
    const bk = svgEl('g', {class:'anim-read'});
    bk.append(svgEl('rect',{x:28,y:84,width:54,height:38,rx:4,fill:'#FEF3C7',stroke:'#D97706','stroke-width':1.5}));
    bk.append(svgEl('line',{x1:55,y1:84,x2:55,y2:122,stroke:'#D97706','stroke-width':1.5}));
    for (const y of [96,104,112]) {
        bk.append(svgEl('line',{x1:33,y1:y,x2:52,y2:y,stroke:'#92400E','stroke-width':1.2}));
        bk.append(svgEl('line',{x1:58,y1:y,x2:77,y2:y,stroke:'#92400E','stroke-width':1.2}));
    }
    svg.append(bk);
    big.append(svg);
    scene.appendChild(big);
}
function drawThink(scene) {
    const big = makeSVG(160, 200);
    const tb = svgEl('g', {class:'anim-think-bubble'});
    tb.append(svgEl('circle',{cx:108, cy:32, r:26, fill:'white', stroke:'#D1D5DB','stroke-width':1.5}));
    const qmark = svgEl('text',{x:99,y:42,'font-size':24});
    qmark.textContent = '❓';
    tb.append(qmark);
    tb.append(svgEl('circle',{cx:84,cy:62,r:5,fill:'white',stroke:'#D1D5DB','stroke-width':1.5}));
    tb.append(svgEl('circle',{cx:76,cy:74,r:3.5,fill:'white',stroke:'#D1D5DB','stroke-width':1.5}));
    big.append(tb);
    const { svg, raG } = baseChar(110, 160, 55);
    svg.setAttribute('y', 35);
    const ra = raG.querySelector('line');
    ra.setAttribute('x2', 45); ra.setAttribute('y2', 40);
    big.append(svg);
    scene.appendChild(big);
}
function drawThrow(scene) {
    const big = makeSVG(160, 170);
    const ball = svgEl('circle',{cx:82,cy:55,r:9,fill:'#EF4444',class:'anim-ball'});
    big.append(ball);
    const { svg, raG } = baseChar(110, 160, 55);
    raG.setAttribute('class','anim-throw-arm');
    svg.setAttribute('x', 15);
    big.append(svg);
    scene.appendChild(big);
}
function drawCut(scene) {
    const big = makeSVG(150, 170);
    const { svg, la, raG } = baseChar(110, 155);
    la.setAttribute('x2', 35); la.setAttribute('y2', 80);
    raG.querySelector('line').setAttribute('x2', 75);
    raG.querySelector('line').setAttribute('y2', 80);
    const sc = svgEl('g', {class:'anim-scissors'});
    sc.append(svgEl('rect',{x:28,y:83,width:56,height:9,rx:4,fill:'#FEF3C7',stroke:'#D97706','stroke-width':1}));
    const txt = svgEl('text',{x:44,y:80,'font-size':22});
    txt.textContent = '✂️';
    sc.append(txt);
    svg.append(sc);
    big.append(svg);
    scene.appendChild(big);
}
function drawSit(scene) {
    const big = makeSVG(180, 175);
    const cx = 70;
    big.append(svgEl('rect', {x:25,y:108,width:90,height:8,rx:3,fill:'#A78BFA'}));
    big.append(svgEl('line', {x1:30,y1:116,x2:30,y2:160,stroke:'#7C3AED','stroke-width':4}));
    big.append(svgEl('line', {x1:110,y1:116,x2:110,y2:160,stroke:'#7C3AED','stroke-width':4}));
    big.append(svgEl('line', {x1:25,y1:72,x2:25,y2:116,stroke:'#7C3AED','stroke-width':4}));
    big.append(svgEl('circle',{cx,cy:32,r:18,fill:'#FBBF24',stroke:'#92400E','stroke-width':2}));
    big.append(svgEl('circle',{cx:cx-6,cy:29,r:2.5,fill:'#1F2937'}));
    big.append(svgEl('circle',{cx:cx+6,cy:29,r:2.5,fill:'#1F2937'}));
    big.append(svgEl('path',  {d:`M ${cx-7} 38 Q ${cx} 44 ${cx+7} 38`,stroke:'#92400E','stroke-width':1.5,fill:'none','stroke-linecap':'round'}));
    big.append(svgEl('line', {x1:cx,y1:50,x2:cx,y2:108,stroke:'#3B82F6','stroke-width':5,'stroke-linecap':'round'}));
    big.append(svgEl('line', {x1:cx,y1:65,x2:cx-25,y2:85,stroke:'#3B82F6','stroke-width':4,'stroke-linecap':'round'}));
    big.append(svgEl('line', {x1:cx,y1:65,x2:cx+25,y2:85,stroke:'#3B82F6','stroke-width':4,'stroke-linecap':'round'}));
    big.append(svgEl('line', {x1:cx,y1:108,x2:cx-28,y2:108,stroke:'#1D4ED8','stroke-width':4,'stroke-linecap':'round'}));
    big.append(svgEl('line', {x1:cx,y1:108,x2:cx+28,y2:108,stroke:'#1D4ED8','stroke-width':4,'stroke-linecap':'round'}));
    big.append(svgEl('line', {x1:cx-28,y1:108,x2:cx-28,y2:155,stroke:'#1D4ED8','stroke-width':4,'stroke-linecap':'round'}));
    big.append(svgEl('line', {x1:cx+28,y1:108,x2:cx+28,y2:155,stroke:'#1D4ED8','stroke-width':4,'stroke-linecap':'round'}));
    big.append(svgEl('ellipse',{cx:cx-28,cy:158,rx:8,ry:4,fill:'#1F2937'}));
    big.append(svgEl('ellipse',{cx:cx+28,cy:158,rx:8,ry:4,fill:'#1F2937'}));
    scene.appendChild(big);
}

let score=0, wrongs=0, qNum=0, current=null, locked=false;
function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function next() {
    locked = false;
    qNum++;
    document.getElementById('q-label').textContent = `שאלה ${qNum} / ${TOTAL}`;
    current = VERBS[Math.floor(Math.random()*VERBS.length)];
    const scene = document.getElementById('scene');
    scene.innerHTML = '';
    current.draw(scene);
    const choices = shuffle([current, ...shuffle(VERBS.filter(v=>v.id!==current.id)).slice(0,3)]);
    const grid = document.getElementById('choices');
    grid.innerHTML = '';
    choices.forEach(v => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn bg-white border-2 border-green-200 rounded-2xl py-4 text-2xl font-bold text-green-800 shadow';
        btn.textContent = v.label;
        btn.dataset.id = v.id;
        btn.onclick = () => pick(v, btn);
        grid.appendChild(btn);
    });
}
function pick(v, btn) {
    if (locked) return;
    locked = true;
    if (v.id === current.id) {
        btn.classList.add('correct');
        score++;
        document.getElementById('score').textContent = score;
        flash('⭐');
    } else {
        btn.classList.add('wrong');
        wrongs++;
        document.getElementById('wrongs').textContent = wrongs;
        flash('💪');
        document.querySelectorAll('[data-id="'+current.id+'"]').forEach(b=>b.classList.add('correct'));
    }
    setTimeout(qNum>=TOTAL ? showResult : next, 1100);
}
function flash(emoji) {
    const scene = document.getElementById('scene');
    const el = document.createElement('div');
    el.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:64px;pointer-events:none;';
    el.textContent = emoji;
    el.classList.add('pop-in');
    scene.style.position='relative';
    scene.appendChild(el);
    setTimeout(()=>el.remove(), 900);
}
function showResult() {
    const pct = score/TOTAL;
    document.getElementById('ov-emoji').textContent  = pct===1?'🏆':pct>=0.7?'🌟':'💪';
    document.getElementById('ov-title').textContent  = pct===1?'מושלם!':pct>=0.7?'כל הכבוד!':'כמעט!';
    document.getElementById('ov-msg').textContent    = pct===1?'ענית נכון על הכל!':pct>=0.7?'עבודה נהדרת!':'נסה שוב, אתה יכול!';
    document.getElementById('ov-score').textContent  = `${score} מתוך ${TOTAL} ✅`;
    document.getElementById('overlay').classList.remove('hidden');
}
function restart() {
    score=0; wrongs=0; qNum=0;
    document.getElementById('score').textContent='0';
    document.getElementById('wrongs').textContent='0';
    document.getElementById('overlay').classList.add('hidden');
    next();
}
next();
</script>
</body>
</html>
