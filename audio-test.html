<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>iPad Audio Debug</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f1f5f9; padding: 12px; }
h1 { font-size: 1.25rem; font-weight: 800; color: #0f172a; margin-bottom: 4px; }
.sub { font-size: 0.75rem; color: #64748b; margin-bottom: 6px; line-height: 1.4; }
.legend { font-size: 0.72rem; background: white; border-radius: 8px; padding: 8px 10px; margin-bottom: 12px; color: #475569; }
.btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 11px 12px; margin-bottom: 7px;
  background: white; border: 2px solid #e2e8f0; border-radius: 12px;
  text-align: left; cursor: pointer; -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
}
.btn.ok   { border-color: #16a34a; background: #f0fdf4; }
.btn.fail { border-color: #dc2626; background: #fef2f2; }
.btn.try  { border-color: #2563eb; background: #eff6ff; }
.icon { font-size: 1.4rem; width: 28px; text-align: center; flex-shrink: 0; }
.info { flex: 1; min-width: 0; }
.name { font-size: 0.82rem; font-weight: 700; color: #1e293b; }
.desc { font-size: 0.7rem; color: #64748b; margin-top: 1px; }
.st { font-size: 1.2rem; flex-shrink: 0; min-width: 28px; text-align: center; }
</style>
</head>
<body>
<h1>🔊 iPad Audio Debug</h1>
<p class="sub">Tap each button. After tapping, does it make a sound?</p>
<div class="legend">
  ⬜ not tried &nbsp;|&nbsp; 🔄 loading &nbsp;|&nbsp; ✅ sound played &nbsp;|&nbsp; ❌ silent / error
</div>
<div id="root"></div>

<script>
/* ── WAV generator (sine wave, no external files needed) ─────────────── */
function makeWav(freq, dur, vol) {
  freq = freq||600; dur = dur||0.35; vol = vol||0.5;
  var sr = 22050, n = Math.floor(sr * dur);
  var ab = new ArrayBuffer(44 + n * 2), dv = new DataView(ab);
  function ws(o,s){ for(var i=0;i<s.length;i++) dv.setUint8(o+i,s.charCodeAt(i)); }
  ws(0,'RIFF'); dv.setUint32(4,36+n*2,true); ws(8,'WAVE'); ws(12,'fmt ');
  dv.setUint32(16,16,true); dv.setUint16(20,1,true); dv.setUint16(22,1,true);
  dv.setUint32(24,sr,true); dv.setUint32(28,sr*2,true);
  dv.setUint16(32,2,true); dv.setUint16(34,16,true);
  ws(36,'data'); dv.setUint32(40,n*2,true);
  for(var i=0;i<n;i++){
    var t=i/sr, env=Math.min(1,(dur-t)/0.06);
    dv.setInt16(44+i*2, Math.round(Math.sin(2*Math.PI*freq*t)*vol*env*32767), true);
  }
  var bytes=new Uint8Array(ab), b='';
  for(var i=0;i<bytes.length;i++) b+=String.fromCharCode(bytes[i]);
  return 'data:audio/wav;base64,'+btoa(b);
}

var WAV = makeWav(600, 0.35, 0.6);

/* ── helpers ─────────────────────────────────────────────────────────── */
function newCtx() {
  return new (window.AudioContext || window.webkitAudioContext)();
}
function playOsc(ctx, setS) {
  var osc = ctx.createOscillator(), g = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.type = 'sine'; osc.frequency.value = 660;
  g.gain.setValueAtTime(0.4, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
  osc.start(); osc.stop(ctx.currentTime + 0.45);
  osc.onended = function(){ setS('ok'); };
}

/* ── 15 tests ────────────────────────────────────────────────────────── */
var TESTS = [

  /* ── HTML Audio ───────────────────────────────────────────── */
  {icon:'🎵', name:'1. HTML Audio (WAV) — onclick',
   desc:'new Audio(wavDataUrl).play()',
   fn: function(s) {
     s('try');
     var a = new Audio(WAV);
     a.play().then(function(){ s('ok'); }).catch(function(e){ console.error(e); s('fail'); });
   }},

  {icon:'👆', name:'2. HTML Audio (WAV) — touchstart',
   desc:'Same WAV but fired from touchstart, not click',
   touch: true,
   fn: function(s) {
     s('try');
     var a = new Audio(WAV);
     a.play().then(function(){ s('ok'); }).catch(function(e){ console.error(e); s('fail'); });
   }},

  {icon:'🔗', name:'3. HTML <audio> DOM element — onclick',
   desc:'<audio> element injected into DOM, then .play()',
   fn: function(s) {
     s('try');
     var el = document.createElement('audio');
     el.src = WAV; el.volume = 1;
     document.body.appendChild(el);
     el.play().then(function(){ s('ok'); el.remove(); })
              .catch(function(e){ console.error(e); s('fail'); el.remove(); });
   }},

  /* ── Web Audio — resume strategies ───────────────────────── */
  {icon:'🎛️', name:'4. Web Audio: resume().then() + oscillator',
   desc:'ctx.resume().then(() => playOscillator())',
   fn: function(s) {
     s('try');
     try {
       var ctx = newCtx();
       ctx.resume().then(function(){ playOsc(ctx,s); }).catch(function(){ s('fail'); });
     } catch(e){ console.error(e); s('fail'); }
   }},

  {icon:'⏳', name:'5. Web Audio: async/await resume',
   desc:'async fn, awaits ctx.resume() before oscillator',
   fn: function(s) {
     s('try');
     (async function(){
       try {
         var ctx = newCtx();
         await ctx.resume();
         playOsc(ctx,s);
       } catch(e){ console.error(e); s('fail'); }
     })();
   }},

  {icon:'🚀', name:'6. Web Audio: no resume() call at all',
   desc:'Create context + start oscillator immediately (no resume)',
   fn: function(s) {
     s('try');
     try {
       var ctx = newCtx();
       playOsc(ctx,s);
       setTimeout(function(){ if(ctx.state!=='running') s('fail'); },1500);
     } catch(e){ console.error(e); s('fail'); }
   }},

  /* ── Web Audio — context creation variants ────────────────── */
  {icon:'🍎', name:'7. webkitAudioContext only (force webkit)',
   desc:'new window.webkitAudioContext() — legacy iOS prefix',
   fn: function(s) {
     s('try');
     try {
       if(!window.webkitAudioContext){ s('fail'); return; }
       var ctx = new window.webkitAudioContext();
       if(ctx.resume) ctx.resume().then(function(){ playOsc(ctx,s); });
       else playOsc(ctx,s);
     } catch(e){ console.error(e); s('fail'); }
   }},

  {icon:'🔄', name:'8. New AudioContext on EVERY tap',
   desc:'Brand-new context created fresh each click (no reuse)',
   fn: function(s) {
     s('try');
     try {
       var ctx = newCtx();
       ctx.resume().then(function(){ playOsc(ctx,s); }).catch(function(){ s('fail'); });
     } catch(e){ console.error(e); s('fail'); }
   }},

  /* ── Web Audio — event type variants ─────────────────────── */
  {icon:'⚡', name:'9. Web Audio on touchstart (not click)',
   desc:'AudioContext + oscillator inside touchstart handler',
   touch: true,
   fn: function(s) {
     s('try');
     try {
       var ctx = newCtx();
       ctx.resume().then(function(){ playOsc(ctx,s); }).catch(function(){ s('fail'); });
     } catch(e){ console.error(e); s('fail'); }
   }},

  /* ── Web Audio — synthesis variants ──────────────────────── */
  {icon:'📊', name:'10. createBufferSource (PCM sine, no oscillator)',
   desc:'Generates PCM samples in a buffer, no OscillatorNode',
   fn: function(s) {
     s('try');
     try {
       var ctx = newCtx();
       ctx.resume().then(function(){
         var sr=ctx.sampleRate, dur=0.4, n=Math.floor(sr*dur);
         var buf=ctx.createBuffer(1,n,sr), d=buf.getChannelData(0);
         for(var i=0;i<n;i++){
           var env=Math.min(1,(dur-i/sr)/0.06);
           d[i]=Math.sin(2*Math.PI*600*i/sr)*0.4*env;
         }
         var src=ctx.createBufferSource(); src.buffer=buf;
         src.connect(ctx.destination); src.start();
         src.onended=function(){ s('ok'); };
       }).catch(function(){ s('fail'); });
     } catch(e){ console.error(e); s('fail'); }
   }},

  {icon:'📢', name:'11. Constant gain — no exponentialRamp',
   desc:'g.gain.value=0.5 (no ramp), square wave 440 Hz',
   fn: function(s) {
     s('try');
     try {
       var ctx = newCtx();
       ctx.resume().then(function(){
         var osc=ctx.createOscillator(), g=ctx.createGain();
         osc.connect(g); g.connect(ctx.destination);
         osc.type='square'; osc.frequency.value=440; g.gain.value=0.5;
         osc.start(); osc.stop(ctx.currentTime+0.25);
         osc.onended=function(){ s('ok'); };
       }).catch(function(){ s('fail'); });
     } catch(e){ console.error(e); s('fail'); }
   }},

  {icon:'📣', name:'12. Max volume — oscillator direct to destination',
   desc:'No GainNode at all; full amplitude square wave',
   fn: function(s) {
     s('try');
     try {
       var ctx = newCtx();
       ctx.resume().then(function(){
         var osc=ctx.createOscillator();
         osc.connect(ctx.destination);
         osc.type='square'; osc.frequency.value=440;
         osc.start(); osc.stop(ctx.currentTime+0.15);
         osc.onended=function(){ s('ok'); };
       }).catch(function(){ s('fail'); });
     } catch(e){ console.error(e); s('fail'); }
   }},

  /* ── Unlock tricks ────────────────────────────────────────── */
  {icon:'🔓', name:'13. Silent buffer first, then oscillator',
   desc:'Start 1-frame silent buffer, THEN resume + oscillator',
   fn: function(s) {
     s('try');
     try {
       var ctx = newCtx();
       var sb=ctx.createBuffer(1,1,ctx.sampleRate);
       var ss=ctx.createBufferSource(); ss.buffer=sb;
       ss.connect(ctx.destination); ss.start(0);
       ctx.resume().then(function(){ playOsc(ctx,s); }).catch(function(){ s('fail'); });
     } catch(e){ console.error(e); s('fail'); }
   }},

  {icon:'2️⃣', name:'14. Two-tap: 1st unlocks, 2nd plays',
   desc:'Tap once (🔄 = ready), tap again to actually play',
   fn: (function(){
     var ctx=null, ready=false;
     return function(s){
       if(!ctx){
         s('try');
         try {
           ctx=newCtx();
           ctx.resume().then(function(){ ready=true; }).catch(function(){ s('fail'); ctx=null; });
         } catch(e){ s('fail'); ctx=null; }
         return;
       }
       if(ready){ playOsc(ctx,s); }
       else { ctx.resume().then(function(){ ready=true; playOsc(ctx,s); }).catch(function(){ s('fail'); }); }
     };
   })()},

  /* ── Non-Web-Audio ────────────────────────────────────────── */
  {icon:'💬', name:'15. speechSynthesis.speak("test")',
   desc:'Completely different audio path — TTS',
   fn: function(s) {
     s('try');
     try {
       if(!window.speechSynthesis){ s('fail'); return; }
       speechSynthesis.cancel();
       var u=new SpeechSynthesisUtterance('test');
       u.lang='en-US'; u.volume=1;
       u.onend=function(){ s('ok'); };
       u.onerror=function(){ s('fail'); };
       speechSynthesis.speak(u);
       setTimeout(function(){ if(speechSynthesis.speaking) s('ok'); },800);
     } catch(e){ console.error(e); s('fail'); }
   }}

];

/* ── Render ──────────────────────────────────────────────────────────── */
var root = document.getElementById('root');

TESTS.forEach(function(t) {
  var btn = document.createElement('button');
  btn.className = 'btn';
  btn.innerHTML =
    '<div class="icon">'+t.icon+'</div>' +
    '<div class="info"><div class="name">'+t.name+'</div><div class="desc" id="d_'+t.name.split('.')[0].trim()+'">'+t.desc+'</div></div>' +
    '<div class="st" id="s_'+t.name.split('.')[0].trim()+'">⬜</div>';

  var num = t.name.split('.')[0].trim();
  var stEl = btn.querySelector('.st');

  function setS(v) {
    if(v==='ok')   { stEl.textContent='✅'; btn.className='btn ok'; }
    if(v==='fail') { stEl.textContent='❌'; btn.className='btn fail'; }
    if(v==='try')  { stEl.textContent='🔄'; btn.className='btn try'; }
  }

  if (t.touch) {
    var fired = false;
    btn.addEventListener('touchstart', function(e) {
      fired = true;
      t.fn(setS);
    }, { passive: true });
    btn.addEventListener('click', function() {
      if (!fired) t.fn(setS); // desktop fallback
      fired = false;
    });
  } else {
    btn.addEventListener('click', function() { t.fn(setS); });
  }

  root.appendChild(btn);
});
</script>
</body>
</html>
