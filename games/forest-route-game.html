<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>היער הקסום לארמון</title>
<style>
  :root{
    --path-tile:#E8D8A0;
    --path-tile-done:#8FCB7E;
    --path-tile-border:#6B4A2B;
    --ink:#FFF8E7;
    --accent:#5B8C5A;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    height:100%;
    font-family:'Varela Round','Segoe UI',sans-serif;
    overflow:hidden;
    direction:rtl;
  }
  .scene{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
    background:
      radial-gradient(circle at 50% 0%, #2C5F4A 0%, #1B3A2E 45%, #0F2419 100%);
  }
  /* magical glowing particles drifting in background */
  .firefly{
    position:absolute;
    width:6px;height:6px;
    border-radius:50%;
    background:#FFF3A0;
    box-shadow:0 0 8px 3px rgba(255,240,150,0.8);
    animation: drift 6s ease-in-out infinite;
    opacity:0.8;
  }
  @keyframes drift{
    0%,100%{ transform:translate(0,0); opacity:0.3;}
    50%{ transform:translate(12px,-18px); opacity:1;}
  }

  /* layered tree silhouettes for depth */
  .tree-layer{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    pointer-events:none;
  }
  .tree-back{ opacity:0.35; }
  .tree-mid{ opacity:0.55; }
  .tree-front{ opacity:0.85; }

  .moon{
    position:absolute;
    top:6%; left:8%;
    width:64px;height:64px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #FFFDF0, #E8E2B8);
    box-shadow:0 0 50px 16px rgba(255,253,230,0.35);
  }

  h1{
    position:relative;
    text-align:center;
    color:var(--ink);
    font-size:clamp(20px,4vw,32px);
    margin:14px 0 4px 0;
    text-shadow:0 2px 6px rgba(0,0,0,0.6);
    letter-spacing:1px;
    z-index:5;
  }
  .subtitle{
    position:relative;
    text-align:center;
    color:var(--ink);
    opacity:0.85;
    font-size:clamp(12px,2vw,16px);
    margin-bottom:6px;
    z-index:5;
    text-shadow:0 1px 4px rgba(0,0,0,0.6);
  }

  .board-wrap{
    position:relative;
    width:100%;
    height:calc(100vh - 80px);
  }

  svg.board{
    width:100%;
    height:100%;
    display:block;
    position:relative;
    z-index:3;
  }

  .tile{
    cursor:pointer;
    transition:transform 0.15s ease;
  }
  .tile:hover .tile-rect{
    filter:brightness(1.15);
  }
  .tile.locked{
    cursor:default;
    opacity:0.55;
  }
  .tile-rect{
    fill:var(--path-tile);
    stroke:var(--path-tile-border);
    stroke-width:3;
    rx:14;
    transition:fill 0.4s ease, opacity 0.4s ease;
  }
  .tile.done .tile-rect{
    fill:var(--path-tile-done);
  }
  .tile.current .tile-rect{
    fill:#FFF3C4;
    stroke:#E8A23A;
    stroke-width:4;
  }
  .tile.special .tile-rect{
    stroke-dasharray: 4,3;
  }
  .tile-num{
    font-size:20px;
    font-weight:700;
    fill:var(--path-tile-border);
    opacity:0.6;
    pointer-events:none;
    user-select:none;
  }
  .tile-icon{
    font-size:20px;
    pointer-events:none;
    user-select:none;
  }

  #hero{
    transition: left 0.55s cubic-bezier(.34,1.4,.64,1), top 0.55s cubic-bezier(.34,1.4,.64,1);
    position:absolute;
    width:64px;
    height:70px;
    z-index:10;
    transform:translate(-50%,-82%);
    pointer-events:none;
    filter:drop-shadow(0 6px 6px rgba(0,0,0,0.4));
  }
  #hero.bounce{
    animation: bounce 0.5s ease;
  }
  @keyframes bounce{
    0%{transform:translate(-50%,-82%) scale(1);}
    35%{transform:translate(-50%,-104%) scale(1.08);}
    100%{transform:translate(-50%,-82%) scale(1);}
  }

  .banner{
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:rgba(15,36,25,0.7);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
  }
  .banner.show{display:flex;}
  .banner-card{
    background:#FFF8E7;
    border-radius:28px;
    padding:36px 30px;
    text-align:center;
    max-width:340px;
    box-shadow:0 16px 40px rgba(0,0,0,0.5);
    border:4px solid #E8A23A;
  }
  .banner-card h2{
    color:#4A3324;
    font-size:26px;
    margin:6px 0;
  }
  .banner-card p{
    color:#4A3324;
    opacity:0.8;
    margin-bottom:18px;
  }
  .banner-card button{
    background:var(--accent);
    color:white;
    border:none;
    padding:12px 26px;
    border-radius:20px;
    font-size:16px;
    cursor:pointer;
    font-family:inherit;
    box-shadow:0 4px 0 #3d6b3c;
  }
  .banner-card button:active{
    transform:translateY(3px);
    box-shadow:0 1px 0 #3d6b3c;
  }

  .progress-wrap{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(2px);
    border-radius:20px;
    padding:6px 16px;
    font-size:14px;
    color:var(--ink);
    z-index:5;
    font-weight:600;
  }

  .sound-toggle{
    position:absolute;
    top:10px;
    left:14px;
    background:rgba(255,255,255,0.18);
    border:none;
    border-radius:50%;
    width:38px;height:38px;
    font-size:18px;
    cursor:pointer;
    z-index:6;
  }

  .confetti{
    position:absolute;
    top:-10px;
    border-radius:2px;
    animation: fall linear forwards;
    z-index:20;
  }
  @keyframes fall{
    to{ transform: translateY(110vh) rotate(360deg); opacity:0.9; }
  }

  /* special effect overlays */
  .fx-layer{
    position:absolute;
    pointer-events:none;
    z-index:8;
  }
  .fx-emoji{
    position:absolute;
    font-size:26px;
    animation: floatUp 1.4s ease-out forwards;
  }
  @keyframes floatUp{
    0%{ transform:translateY(0) scale(0.6); opacity:0; }
    20%{ opacity:1; }
    100%{ transform:translateY(-90px) scale(1.2); opacity:0; }
  }
  .fx-burst{
    position:absolute;
    font-size:30px;
    animation: burstOut 0.9s ease-out forwards;
  }
  @keyframes burstOut{
    0%{ transform:translate(0,0) scale(0.3) rotate(0deg); opacity:1;}
    100%{ transform:translate(var(--dx),var(--dy)) scale(1.1) rotate(180deg); opacity:0;}
  }
  .rainbow-arc{
    position:absolute;
    pointer-events:none;
    animation: rainbowFade 1.8s ease-out forwards;
    opacity:0;
  }
  @keyframes rainbowFade{
    0%{ opacity:0; transform:scale(0.7) translateY(20px);}
    25%{ opacity:1; transform:scale(1) translateY(0);}
    80%{ opacity:1;}
    100%{ opacity:0; transform:scale(1) translateY(-10px);}
  }
  .screen-flash{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:40;
    opacity:0;
  }
</style>
</head>

<script>
/* ================= AUDIO ENGINE (Web Audio API, no files needed) ================= */
let audioCtx = null;
let soundOn = true;
function ensureAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, dur=0.18, type='sine', vol=0.18, delay=0){
  if(!soundOn) return;
  ensureAudio();
  const t0 = audioCtx.currentTime + delay;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(vol, t0+0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0+dur+0.02);
}

// step sound: gentle plucky "boop" with slight pitch rise based on tile index
function playStepSound(i){
  const base = 320 + (i%5)*22;
  playTone(base, 0.12, 'triangle', 0.16);
  playTone(base*1.5, 0.1, 'sine', 0.08, 0.03);
}

// special sparkle chime (ascending arpeggio)
function playSparkleChime(){
  const notes = [523,659,784,988];
  notes.forEach((n,idx)=> playTone(n, 0.22, 'sine', 0.13, idx*0.08));
}

// owl hoot for forest ambience effect
function playOwlHoot(){
  playTone(440, 0.3, 'sine', 0.1);
  playTone(370, 0.35, 'sine', 0.09, 0.18);
}

// firefly twinkle
function playTwinkle(){
  playTone(1200, 0.08, 'sine', 0.07);
  playTone(1500, 0.08, 'sine', 0.06, 0.06);
}

// rainbow whoosh
function playWhoosh(){
  if(!soundOn) return;
  ensureAudio();
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(200, t0);
  osc.frequency.exponentialRampToValueAtTime(900, t0+0.4);
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.exponentialRampToValueAtTime(0.1, t0+0.05);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0+0.45);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0+0.5);
}

// fanfare for finishing
function playFanfare(){
  const notes = [523,659,784,1046,784,1046];
  notes.forEach((n,idx)=> playTone(n, 0.3, 'triangle', 0.18, idx*0.14));
}

document.getElementById('soundToggle').addEventListener('click', ()=>{
  soundOn = !soundOn;
  document.getElementById('soundToggle').textContent = soundOn ? '🔊' : '🔇';
  if(soundOn){ ensureAudio(); playTwinkle(); }
});

/* ================= FIREFLIES (background ambience) ================= */
const fireflyLayer = document.getElementById('fireflyLayer');
for(let i=0;i<22;i++){
  const f = document.createElement('div');
  f.className = 'firefly';
  f.style.left = Math.random()*100+'%';
  f.style.top = (20+Math.random()*70)+'%';
  f.style.animationDuration = (4+Math.random()*5)+'s';
  f.style.animationDelay = (Math.random()*5)+'s';
  fireflyLayer.appendChild(f);
}

/* ================= PATH / TILES ================= */
const NUM_TILES = 14;
const tileW = 78, tileH = 58;

function generatePositions(n){
  const positions = [];
  const rows = 4;
  const perRow = Math.ceil(n/rows);
  const margin = 60;
  const boardW = 800, boardH = 560;
  const rowH = (boardH - 160) / (rows-1);
  let idx = 0;
  for(let r=0;r<rows;r++){
    const y = boardH - 90 - r*rowH;
    const itemsThisRow = Math.min(perRow, n-idx);
    const usableW = boardW - margin*2;
    for(let c=0;c<itemsThisRow;c++){
      let x;
      const t = itemsThisRow===1?0.5:c/(itemsThisRow-1);
      if(r%2===0){
        x = margin + t*usableW;
      } else {
        x = margin + (1-t)*usableW;
      }
      positions.push({x,y});
      idx++;
      if(idx>=n) break;
    }
    if(idx>=n) break;
  }
  return positions;
}

const positions = generatePositions(NUM_TILES);

// Define special tile effects by index (0-based)
// types: 'sparkle' | 'firefly' | 'rainbow' | 'butterfly' | 'star' | 'owl'
const specialTiles = {
  2:  { type:'butterfly', icon:'🦋' },
  4:  { type:'firefly',   icon:'✨' },
  6:  { type:'rainbow',   icon:'🌈' },
  8:  { type:'owl',       icon:'🦉' },
  10: { type:'star',      icon:'⭐' },
  12: { type:'sparkle',   icon:'💫' }
};

const svg = document.getElementById('board');
const NS = "http://www.w3.org/2000/svg";

function drawConnector(){
  let d = "";
  positions.forEach((p,i)=>{
    d += (i===0?"M":"L") + p.x + "," + p.y + " ";
  });
  const path = document.createElementNS(NS,"path");
  path.setAttribute("d", d);
  path.setAttribute("stroke", "#C9A36A");
  path.setAttribute("stroke-width", "6");
  path.setAttribute("stroke-dasharray", "2,16");
  path.setAttribute("stroke-linecap", "round");
  path.setAttribute("fill", "none");
  path.setAttribute("opacity", "0.5");
  svg.appendChild(path);
}
drawConnector();

function drawStartFlag(){
  const p = positions[0];

}

positions.forEach((p,i)=>{
  const g = document.createElementNS(NS,"g");
  g.setAttribute("class","tile locked" + (specialTiles[i] ? " special":""));

    icon.setAttribute("text-anchor","middle");
    icon.textContent = specialTiles[i].icon;
    g.appendChild(icon);
  }

  g.addEventListener("click", ()=> onTileClick(i));
  svg.appendChild(g);
  tileEls.push(g);
});

const heroURL = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(heroSVG)));
const hero = document.getElementById('hero');
hero.src = heroURL;

let current = -1;
const startPoint = { x: positions[0].x - 70, y: positions[0].y };

function svgPointToPixel(svgX, svgY){
  const rect = svg.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  // preserveAspectRatio="xMidYMid meet" scales uniformly and centers (letterbox),
  // so we must use a single scale factor + centering offset, not independent X/Y scales.
  const scale = Math.min(rect.width / vb.width, rect.height / vb.height);
  const renderedW = vb.width * scale;
  const renderedH = vb.height * scale;
  const offsetX = (rect.width - renderedW) / 2;
  const offsetY = (rect.height - renderedH) / 2;
  const wrapRect = document.querySelector('.board-wrap').getBoundingClientRect();
  return {
    left: (rect.left - wrapRect.left) + offsetX + (svgX - vb.x) * scale,
    top: (rect.top - wrapRect.top) + offsetY + (svgY - vb.y) * scale
  };
}

function placeHero(svgX, svgY, animate=true){
  const pos = svgPointToPixel(svgX, svgY);
  hero.style.left = pos.left + "px";
  hero.style.top = pos.top + "px";
  if(animate){
    hero.classList.remove('bounce');
    void hero.offsetWidth;
    hero.classList.add('bounce');
  }
}

function updateProgress(){
  const bar = document.getElementById('progressLabel');
  const done = Math.max(current+1,0);
  bar.textContent = `התקדמות: ${done} / ${NUM_TILES}`;
}

function refreshTileStates(){
  tileEls.forEach((g,i)=>{
    g.classList.remove('locked','current','done');
    if(i <= current){
      g.classList.add('done');
    } else if(i === current+1){
      g.classList.add('current');
    } else {
      g.classList.add('locked');
    }
  });
}

function onTileClick(i){
  if(i !== current+1) return;
  ensureAudio();
  current = i;
  const p = positions[i];
  placeHero(p.x, p.y);
  refreshTileStates();
  updateProgress();
  playStepSound(i);
  triggerEffect(i, p);

  if(current === NUM_TILES-1){
    setTimeout(()=>{
      celebrate();
      playFanfare();
      document.getElementById('winBanner').classList.add('show');
    }, 650);
  }
}

/* ================= SPECIAL EFFECTS ================= */
function pixelForTile(p){
  return svgPointToPixel(p.x, p.y);
}

function spawnFloatingEmojis(px, py, emojis, count=6, spread=70){
  const wrap = document.querySelector('.board-wrap');
  for(let k=0;k<count;k++){
    const el = document.createElement('div');
    el.className = 'fx-emoji';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = (px - spread/2 + Math.random()*spread) + 'px';
    el.style.top = (py - 10) + 'px';
    el.style.animationDelay = (Math.random()*0.3)+'s';
    wrap.appendChild(el);
    setTimeout(()=> el.remove(), 1800);
  }
}

function spawnBurst(px, py, emoji, count=10){
  const wrap = document.querySelector('.board-wrap');
  for(let k=0;k<count;k++){
    const el = document.createElement('div');
    el.className = 'fx-burst';
    el.textContent = emoji;
    const angle = (Math.PI*2*k)/count;
    const dist = 60 + Math.random()*40;
    el.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
    el.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
    el.style.left = px + 'px';
    el.style.top = py + 'px';
    wrap.appendChild(el);
    setTimeout(()=> el.remove(), 1000);
  }
}

function flashScreen(color){
  const f = document.getElementById('screenFlash');
  f.style.background = color;
  f.style.transition = 'none';
  f.style.opacity = '0.35';
  requestAnimationFrame(()=>{
    f.style.transition = 'opacity 0.6s ease';
    f.style.opacity = '0';
  });
}

function spawnRainbowArc(px, py){
  const wrap = document.querySelector('.board-wrap');
  const el = document.createElement('div');
  el.className = 'rainbow-arc';
  el.style.left = (px-60)+'px';
  el.style.top = (py-110)+'px';
  el.innerHTML = `<svg width="120" height="80" viewBox="0 0 120 80">
    <path d="M10 80 A50 50 0 0 1 110 80" stroke="#FF4D4D" stroke-width="6" fill="none"/>
    <path d="M18 80 A42 42 0 0 1 102 80" stroke="#FFA64D" stroke-width="6" fill="none"/>
    <path d="M26 80 A34 34 0 0 1 94 80" stroke="#FFE14D" stroke-width="6" fill="none"/>
    <path d="M34 80 A26 26 0 0 1 86 80" stroke="#4DD672" stroke-width="6" fill="none"/>
    <path d="M42 80 A18 18 0 0 1 78 80" stroke="#4DA6FF" stroke-width="6" fill="none"/>
  </svg>`;
  wrap.appendChild(el);
  setTimeout(()=> el.remove(), 1900);
}

function triggerEffect(i, p){
  const px = pixelForTile(p).left;
  const py = pixelForTile(p).top;
  const special = specialTiles[i];

  if(!special){
    // gentle generic sparkle puff for ordinary steps
    spawnFloatingEmojis(px, py, ['🍃','✨'], 3, 36);
    return;
  }

  switch(special.type){
    case 'butterfly':
      spawnFloatingEmojis(px, py, ['🦋'], 5, 90);
      playTwinkle();
      break;
    case 'firefly':
      spawnFloatingEmojis(px, py, ['✨','💛'], 8, 80);
      playSparkleChime();
      break;
    case 'rainbow':
      spawnRainbowArc(px, py);
      flashScreen('rgba(255,255,255,0.5)');
      playWhoosh();
      break;
    case 'owl':
      spawnFloatingEmojis(px, py, ['🦉'], 1, 10);
      playOwlHoot();
      break;
    case 'star':
      spawnBurst(px, py, '⭐', 10);
      playSparkleChime();
      break;
    case 'sparkle':
      spawnBurst(px, py, '💫', 8);
      flashScreen('rgba(200,160,255,0.35)');
      playSparkleChime();
      break;
  }
}

/* ================= CONFETTI / WIN ================= */
function celebrate(){
  const colors = ["#E8849A","#FFC93C","#5B8C5A","#6EC1E4","#C77DFF"];
  for(let i=0;i<70;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + "%";
    c.style.width = (6+Math.random()*6)+"px";
    c.style.height = (6+Math.random()*6)+"px";
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (2+Math.random()*2)+"s";
    c.style.animationDelay = (Math.random()*0.5)+"s";
    document.querySelector('.scene').appendChild(c);
    setTimeout(()=> c.remove(), 4500);
  }
}

function resetGame(){
  current = -1;
  refreshTileStates();
  updateProgress();
  placeHero(startPoint.x+70, startPoint.y, false);
  document.getElementById('winBanner').classList.remove('show');
}

window.addEventListener('load', ()=>{
  refreshTileStates();
  updateProgress();
  placeHero(startPoint.x+70, startPoint.y, false);
});
window.addEventListener('resize', ()=>{
  const p = current>=0 ? positions[current] : {x:startPoint.x+70, y:startPoint.y};
  placeHero(p.x, p.y, false);
});
</script>
