<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Speech Debug</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f1f5f9; padding: 12px; direction: ltr; }
h1 { font-size: 1.1rem; font-weight: 800; color: #0f172a; margin-bottom: 4px; }
.sub { font-size: 0.72rem; color: #64748b; margin-bottom: 10px; }
.btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 10px 12px; margin-bottom: 6px;
  background: white; border: 2px solid #e2e8f0; border-radius: 12px;
  text-align: left; cursor: pointer; -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
}
.btn.ok   { border-color: #16a34a; background: #f0fdf4; }
.btn.fail { border-color: #dc2626; background: #fef2f2; }
.btn.try  { border-color: #2563eb; background: #eff6ff; }
.icon { font-size: 1.3rem; width: 26px; text-align: center; flex-shrink: 0; }
.info { flex: 1; min-width: 0; }
.name { font-size: 0.8rem; font-weight: 700; color: #1e293b; }
.desc { font-size: 0.68rem; color: #64748b; margin-top: 1px; }
.st { font-size: 1.1rem; flex-shrink: 0; min-width: 26px; text-align: center; }
#voices-out { font-size: 0.65rem; color: #475569; background: white; border-radius: 8px; padding: 8px; margin-bottom: 8px; white-space: pre-wrap; max-height: 100px; overflow-y: auto; }
</style>
</head>
<body>
<h1>🗣️ Speech Debug</h1>
<p class="sub">Tap each button. ⬜ not tried | 🔄 speaking | ✅ heard | ❌ silent/error</p>
<div id="voices-out">Tap "List Voices" first…</div>
<div id="root"></div>

<script>
/* ── WAV generator (same as game) ─────────────────────────────── */
function makeWav() {
  var SR=22050, dur=0.09, n=Math.floor(SR*dur);
  var ab=new ArrayBuffer(44+n*2), dv=new DataView(ab);
  function ws(o,s){ for(var i=0;i<s.length;i++) dv.setUint8(o+i,s.charCodeAt(i)); }
  ws(0,'RIFF'); dv.setUint32(4,36+n*2,true); ws(8,'WAVE'); ws(12,'fmt ');
  dv.setUint32(16,16,true); dv.setUint16(20,1,true); dv.setUint16(22,1,true);
  dv.setUint32(24,SR,true); dv.setUint32(28,SR*2,true);
  dv.setUint16(32,2,true); dv.setUint16(34,16,true);
  ws(36,'data'); dv.setUint32(40,n*2,true);
  for(var i=0;i<n;i++){
    var t=i/SR;
    var v=(Math.sin(2*Math.PI*600*t)>0?1:-1)*0.15*(1-t/dur);
    dv.setInt16(44+i*2, Math.round(v*32767), true);
  }
  var bytes=new Uint8Array(ab), b='';
  for(var i=0;i<bytes.length;i++) b+=String.fromCharCode(bytes[i]);
  return 'data:audio/wav;base64,'+btoa(b);
}
var CLICK_WAV = makeWav();

function playClick(cb) {
  var a = new Audio(CLICK_WAV);
  a.onended = cb || null;
  a.play().catch(function(){});
}

function spk(text, lang, voice, cb) {
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  if (lang)  u.lang  = lang;
  if (voice) u.voice = voice;
  u.rate = 0.8; u.pitch = 1.1; u.volume = 1;
  u.onend   = function(){ cb && cb('ok'); };
  u.onerror = function(e){ cb && cb('fail:'+e.error); };
  speechSynthesis.speak(u);
  setTimeout(function(){
    if(speechSynthesis.speaking || speechSynthesis.pending) cb && cb('ok');
  }, 1200);
}

function getVoices() { return speechSynthesis.getVoices(); }
function heVoice() {
  var vv = getVoices();
  return vv.find(function(v){ return v.lang==='he-IL'||v.lang==='he'; })
      || vv.find(function(v){ return v.lang.startsWith('he'); })
      || null;
}

var TESTS = [

  { icon:'📋', name:'0. List available voices',
    desc:'Shows all voices the browser reports',
    fn: function(s) {
      s('try');
      var load = function() {
        var vv = getVoices();
        var txt = vv.length === 0 ? '(none yet)' : vv.map(function(v,i){
          return i+': '+v.name+' ['+v.lang+']'+(v.default?' *':'');
        }).join('\n');
        document.getElementById('voices-out').textContent = txt;
        s(vv.length > 0 ? 'ok' : 'fail');
      };
      if(speechSynthesis.onvoiceschanged !== undefined)
        speechSynthesis.onvoiceschanged = load;
      load();
    }},

  { icon:'🇺🇸', name:'1. English "hello" — lang=en-US',
    desc:'Baseline: same as test-15 from previous page',
    fn: function(s) {
      s('try');
      spk('hello', 'en-US', null, function(r){ s(r==='ok'?'ok':'fail'); });
    }},

  { icon:'🇮🇱', name:'2. Hebrew text — lang=he-IL, no voice',
    desc:'speak("הילד קופץ", lang=he-IL) no explicit voice',
    fn: function(s) {
      s('try');
      spk('הילד קופץ', 'he-IL', null, function(r){ s(r==='ok'?'ok':'fail'); });
    }},

  { icon:'🔍', name:'3. Hebrew text — best he voice selected',
    desc:'Finds he-IL voice via getVoices(), passes it explicitly',
    fn: function(s) {
      s('try');
      var v = heVoice();
      spk('הילד קופץ', 'he-IL', v, function(r){ s(r==='ok'?'ok':'fail'); });
    }},

  { icon:'🌐', name:'4. Hebrew text — no lang set at all',
    desc:'No lang, no voice: browser default picks language',
    fn: function(s) {
      s('try');
      spk('הילד קופץ', null, null, function(r){ s(r==='ok'?'ok':'fail'); });
    }},

  { icon:'🔄', name:'5. cancel() then speak Hebrew immediately',
    desc:'speechSynthesis.cancel() → speak() in same tick (game does this)',
    fn: function(s) {
      s('try');
      speechSynthesis.cancel();
      spk('הילד קופץ', 'he-IL', heVoice(), function(r){ s(r==='ok'?'ok':'fail'); });
    }},

  { icon:'⏱️', name:'6. cancel() + 50 ms delay then speak',
    desc:'Small gap between cancel and speak',
    fn: function(s) {
      s('try');
      speechSynthesis.cancel();
      setTimeout(function(){
        spk('הילד קופץ', 'he-IL', heVoice(), function(r){ s(r==='ok'?'ok':'fail'); });
      }, 50);
    }},

  { icon:'🔊', name:'7. HTML Audio THEN speak (no overlap)',
    desc:'Play click sound, wait for it to finish, then speak',
    fn: function(s) {
      s('try');
      playClick(function(){
        spk('הילד קופץ', 'he-IL', heVoice(), function(r){ s(r==='ok'?'ok':'fail'); });
      });
    }},

  { icon:'🎵', name:'8. HTML Audio + speak simultaneously',
    desc:'Both start at same time (what the game does now)',
    fn: function(s) {
      s('try');
      playClick();
      spk('הילד קופץ', 'he-IL', heVoice(), function(r){ s(r==='ok'?'ok':'fail'); });
    }},

  { icon:'⏳', name:'9. speak inside setTimeout 600 ms',
    desc:'Exact pattern game used before the fix (should fail on iPad)',
    fn: function(s) {
      s('try');
      setTimeout(function(){
        spk('הילד קופץ', 'he-IL', heVoice(), function(r){ s(r==='ok'?'ok':'fail'); });
      }, 600);
    }},

  { icon:'🔑', name:'10. speak inside setTimeout 0 ms',
    desc:'Next event-loop tick — still outside gesture?',
    fn: function(s) {
      s('try');
      setTimeout(function(){
        spk('הילד קופץ', 'he-IL', heVoice(), function(r){ s(r==='ok'?'ok':'fail'); });
      }, 0);
    }},

  { icon:'📜', name:'11. Long Hebrew sentence',
    desc:'Full sentence like game uses: "הילד קופץ גבוה מאוד"',
    fn: function(s) {
      s('try');
      spk('הילד קופץ גבוה מאוד', 'he-IL', heVoice(), function(r){ s(r==='ok'?'ok':'fail'); });
    }},

  { icon:'🔁', name:'12. Speak twice in a row (cancel between)',
    desc:'cancel() + speak, then cancel() + speak again — simulates rapid taps',
    fn: function(s) {
      s('try');
      spk('הילד קופץ', 'he-IL', heVoice(), null);
      setTimeout(function(){
        spk('הילדה קופצת', 'he-IL', heVoice(), function(r){ s(r==='ok'?'ok':'fail'); });
      }, 300);
    }},

];

var root = document.getElementById('root');
TESTS.forEach(function(t) {
  var btn = document.createElement('button');
  btn.className = 'btn';
  btn.innerHTML =
    '<div class="icon">'+t.icon+'</div>' +
    '<div class="info"><div class="name">'+t.name+'</div><div class="desc">'+t.desc+'</div></div>' +
    '<div class="st">⬜</div>';
  var stEl = btn.querySelector('.st');
  function setS(v) {
    stEl.textContent = v==='ok'?'✅': v==='fail'?'❌':'🔄';
    btn.className = 'btn '+(v==='ok'?'ok': v==='fail'?'fail':'try');
  }
  btn.addEventListener('click', function(){ t.fn(setS); });
  root.appendChild(btn);
});
</script>
</body>
</html>
