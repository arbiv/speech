<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחקי דיבור</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Assistant', sans-serif;
            min-height: 100vh;
            background: linear-gradient(to bottom, #f0fdf4, #eff6ff);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
        }
        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            color: #166534;
            margin-top: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #6b7280;
            font-size: 1.125rem;
            margin-bottom: 2.5rem;
        }
        .game-grid {
            display: grid;
            gap: 1.25rem;
            width: 100%;
            max-width: 28rem;
        }
        .game-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -2px rgba(0,0,0,.1);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 2px solid transparent;
            text-decoration: none;
            transition: box-shadow .15s, transform .15s, border-color .15s;
        }
        .game-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -4px rgba(0,0,0,.1);
            transform: translateY(-4px);
            border-color: #bbf7d0;
        }
        .game-icon { font-size: 3rem; line-height: 1; }
        .game-title { font-size: 1.5rem; font-weight: 700; color: #15803d; }
        .game-desc { color: #9ca3af; font-size: 0.875rem; margin-top: 0.25rem; }
    </style>
</head>
<body>
    <h1>🗣️ משחקי דיבור</h1>
    <p class="subtitle">בחרו משחק להתחיל</p>
    <div class="game-grid">
        <a href="games/verbs-game.html" class="game-card">
            <div class="game-icon">🎮</div>
            <div>
                <h2 class="game-title">משחק הפעלים</h2>
                <p class="game-desc">זהה מה הדמות עושה – קופץ, אוכל, קורא ועוד</p>
            </div>
        </a>
        <a href="games/plurals-emoji-game.html" class="game-card">
            <div class="game-icon">🔢</div>
            <div>
                <h2 class="game-title">משחק ריבוי זכר</h2>
                <p class="game-desc">למד יחיד ורבים – כדור, כדורים ועוד</p>
            </div>
        </a>
    </div>
</body>
</html>
