<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>פעלים - זכר ונקבה</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="verbs-game.css">
</head>
<body class="min-h-screen flex flex-col" onclick="activateAudio()" ontouchstart="activateAudio()">

<!-- Animated gradient orbs — living background depth -->
<div aria-hidden="true" style="position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;">
  <div class="bg-orb" style="width:520px;height:520px;left:-160px;top:-120px;background:#bfdbfe;animation-duration:22s;"></div>
  <div class="bg-orb" style="width:460px;height:460px;right:-130px;top:12%;background:#fce7f3;animation-duration:28s;animation-delay:-9s;"></div>
  <div class="bg-orb" style="width:420px;height:420px;left:18%;bottom:-110px;background:#d1fae5;animation-duration:20s;animation-delay:-5s;"></div>
  <div class="bg-orb" style="width:300px;height:300px;right:12%;bottom:8%;background:#fef3c7;animation-duration:26s;animation-delay:-14s;"></div>
</div>

<!-- Canvas for physics-based confetti celebrations -->
<canvas id="confetti-canvas" style="position:fixed;inset:0;pointer-events:none;z-index:9998;"></canvas>

<!-- ===== HEADER ===== -->
<header class="text-center py-4 px-4">
  <h1 class="text-4xl font-black" style="background:linear-gradient(135deg,#1e40af,#6d28d9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
    🎮 פעלים - זכר ונקבה
  </h1>
  <div class="flex items-center justify-center gap-4 mt-2">
    <div class="streak-badge">
      <span>⭐</span>
      <span>הצלחתם כבר: <span id="streak-num">0</span> פעלים</span>
    </div>
    <button class="reset-btn" onclick="resetAll(event)">↺ אפס</button>
  </div>
</header>

<!-- ===== VERB TABS ===== -->
<div class="px-4 py-3">
  <div class="verb-grid">
    <button class="verb-tab active" onclick="selectVerb(0,event)"><span class="verb-emoji">🤸</span><span>קפיצה</span></button>
    <button class="verb-tab" onclick="selectVerb(1,event)"><span class="verb-emoji">😂</span><span>צחוק</span></button>
    <button class="verb-tab" onclick="selectVerb(2,event)"><span class="verb-emoji">🪑</span><span>ישיבה</span></button>
    <button class="verb-tab" onclick="selectVerb(3,event)"><span class="verb-emoji">📚</span><span>למידה</span></button>
    <button class="verb-tab" onclick="selectVerb(4,event)"><span class="verb-emoji">✂️</span><span>גזירה</span></button>
    <button class="verb-tab" onclick="selectVerb(5,event)"><span class="verb-emoji">⚽</span><span>זריקה</span></button>
    <button class="verb-tab" onclick="selectVerb(6,event)"><span class="verb-emoji">💭</span><span>חשיבה</span></button>
    <button class="verb-tab" onclick="selectVerb(7,event)"><span class="verb-emoji">💃</span><span>ריקוד</span></button>
  </div>
</div>

<!-- ===== CHARACTER CARDS ===== -->
<main class="flex-1 flex items-center justify-center px-4 py-2">

      </div>

      <div class="word-display">

              <circle cx="160" cy="34" r="5.5" fill="#db2777"/>
              <!-- Hair highlight -->
              <ellipse cx="80" cy="35" rx="18" ry="8" fill="white" opacity="0.15"/>
            </g>
          </g><!-- end char-group -->

          <!-- THOUGHT BUBBLE -->
          <g class="n-thought">
            <circle cx="115" cy="55" r="6" fill="white" stroke="#94a3b8" stroke-width="2"/>
            <circle cx="128" cy="42" r="9" fill="white" stroke="#94a3b8" stroke-width="2"/>
            <circle cx="143" cy="26" r="13" fill="white" stroke="#94a3b8" stroke-width="2"/>
            <ellipse cx="162" cy="14" rx="24" ry="18" fill="white" stroke="#94a3b8" stroke-width="2"/>
            <text x="162" y="20" text-anchor="middle" font-size="18">💭</text>
          </g>
        </svg>
      </div>

      <div class="word-display">
        <button class="speak-btn" onclick="speakWord('n',event)" title="השמע מילה">🔊</button>
        <span class="target-word" id="n-word">קופצת</span>
      </div>
    </div>

  </div><!-- end characters row -->
</main>

<!-- ===== MODE SELECTOR ===== -->
<footer class="py-4 px-4">
  <div class="flex flex-col items-center gap-3">
    <p class="text-sm font-bold text-gray-500 uppercase tracking-wide">מצב משחק:</p>
    <div class="flex gap-3 flex-wrap justify-center">
      <button class="mode-btn active" id="mode-click" onclick="selectMode('click',event)">👆 לחיצה ישירה</button>
      <button class="mode-btn" id="mode-voice" onclick="selectMode('voice',event)">🎙️ זיהוי קולי</button>
    </div>
    <p class="text-xs text-gray-400 text-center mt-1" id="mode-hint">לחצ/י על הדמות להפעלת האנימציה</p>
  </div>
</footer>

<!-- ===== VOICE OVERLAY ===== -->
<div id="voice-overlay">
  <div id="voice-modal">
    <p class="text-lg font-bold text-gray-500 mb-1">אמר/י בקול:</p>
    <p class="text-5xl font-black mb-6" id="voice-target-word" style="color:#1d4ed8">קופץ</p>
    <div class="mic-ring" id="mic-ring" onclick="toggleListening()">🎤</div>
    <p class="text-base font-bold text-gray-600 mb-6" id="voice-status">לחץ/י על המיקרופון לדיבור</p>
    <div class="flex gap-3 justify-center flex-wrap">
      <button onclick="simulateMicro()" class="px-6 py-3 rounded-2xl font-bold text-white text-base"
        style="background:linear-gradient(135deg,#6ee7b7,#3b82f6)">
        ✓ סימולציה (עקיפה)
      </button>
      <button onclick="closeVoiceOverlay()" class="px-6 py-3 rounded-2xl font-bold text-gray-600 border-2 border-gray-200 text-base">
        ✕ ביטול
      </button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="verbs-game.js"></script>
</body>
</html>
