<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>TTS Test - אוכל</title>
<style>
  body { font-family: Arial, sans-serif; padding: 2rem; background: #f0f4ff; direction: rtl; }
  h1 { color: #1e40af; margin-bottom: 0.5rem; }
  p { color: #555; margin-bottom: 2rem; font-size: 0.9rem; }
  h2 { color: #374151; margin: 1.5rem 0 0.5rem; font-size: 1rem; text-transform: uppercase; letter-spacing: .05em; }
  .btn {
    display: block; width: 100%; margin: 0.5rem 0;
    padding: 0.9rem 1.2rem; border: 2px solid #cbd5e1;
    border-radius: 12px; background: white;
    font-size: 1rem; cursor: pointer; text-align: right;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn:hover { background: #eff6ff; border-color: #93c5fd; }
  .spoken { font-weight: bold; color: #1d4ed8; font-size: 1.2rem; }
  .label { font-size: 0.72rem; color: #888; display: block; margin-top: 2px; }
  #status { margin-top: 1.5rem; padding: 0.75rem 1rem; background: #fef9c3;
            border-radius: 8px; color: #78350f; font-size: 0.9rem; min-height: 2.5rem; }
  .good { border-color: #86efac !important; background: #f0fdf4 !important; }
</style>
</head>
<body>
<h1>בדיקת הגייה TTS — אוכל (עדכון)</h1>
<p>רק <strong>אוכלים</strong> עבד עד כה. הנה גישות חדשות. לחץ/י וסמן/י מה עובד.</p>

<h2>גישה 1 — תחביר מכריח פועל</h2>

<button class="btn" onclick="test('אוכל תפוח', this)">
  <span class="spoken">אוכל תפוח</span>
  <span class="label">פועל + מושא ישיר — "food apple" לא הגיוני, אז TTS יבחר פועל</span>
</button>

<button class="btn" onclick="test('אוכל ושותה', this)">
  <span class="spoken">אוכל ושותה</span>
  <span class="label">שני פעלים בצמד — "food and drinking" אינו הגיוני</span>
</button>

<button class="btn" onclick="test('הוא אוכל תפוח', this)">
  <span class="spoken">הוא אוכל תפוח</span>
  <span class="label">כינוי גוף + פועל + מושא</span>
</button>

<h2>גישה 2 — שאלה / קריאה</h2>

<button class="btn" onclick="test('אתה אוכל?', this)">
  <span class="spoken">אתה אוכל?</span>
  <span class="label">שאלה — TTS משתמש בהטעמה שונה</span>
</button>

<button class="btn" onclick="test('אוכל!', this)">
  <span class="spoken">אוכל!</span>
  <span class="label">קריאה — סימן קריאה משנה פרוזודיה</span>
</button>

<h2>גישה 3 — שינוי הצורה המדוברת (לא המוצגת)</h2>

<button class="btn" onclick="test('לאכול', this)">
  <span class="spoken">לאכול</span>
  <span class="label">שם הפועל — חד-משמעי לגמרי (מוצג: "אוכל", מדובר: "לאכול"?)</span>
</button>

<button class="btn" onclick="test('אוכלים', this)">
  <span class="spoken">אוכלים</span>
  <span class="label">✓ עבד! רבים — האם לאמץ כפתרון? (מוצג: "אוכל", מדובר: "אוכלים")</span>
</button>

<h2>גישה 4 — SSML פונמות (Chrome בלבד)</h2>

<button class="btn" onclick="testSSML('<speak><phoneme alphabet=\'ipa\' ph=\'ʔo.ˈχel\'>אוכל</phoneme></speak>', this)">
  <span class="spoken">SSML IPA: /ʔo.ˈχel/</span>
  <span class="label">פונמה מפורשת עם הטעמה על הברה שנייה</span>
</button>

<button class="btn" onclick="testSSML('<speak><prosody rate=\'slow\' pitch=\'+10%\'>אוכל</prosody></speak>', this)">
  <span class="spoken">SSML prosody</span>
  <span class="label">קצב איטי + גובה טון</span>
</button>

<h2>גישה 5 — קול שונה</h2>
<div id="voice-list"></div>

<div id="status">לחץ/י על כפתור לבדיקה</div>

<script>
let heVoice = null;

function initVoice() {
  const load = () => {
    const all = speechSynthesis.getVoices();
    heVoice = all.find(v => v.lang === 'he-IL' || v.lang === 'he')
           || all.find(v => v.lang.startsWith('he'))
           || null;

    const heVoices = all.filter(v => v.lang.startsWith('he'));
    const vlist = document.getElementById('voice-list');
    if (heVoices.length > 1) {
      heVoices.forEach((v, i) => {
        const btn = document.createElement('button');
        btn.className = 'btn';
        btn.innerHTML = `<span class="spoken">קול: ${v.name}</span><span class="label">${v.lang} — לחץ/י לשמוע "אוכל" בקול זה</span>`;
        btn.onclick = () => testWithVoice('אוכל', v, btn);
        vlist.appendChild(btn);
      });
    } else {
      vlist.innerHTML = '<p style="color:#888;font-size:.85rem">קול עברי אחד בלבד: ' + (heVoice ? heVoice.name : 'לא נמצא') + '</p>';
    }

    document.getElementById('status').textContent = heVoice
      ? 'קול עברי: ' + heVoice.name + ' (' + heVoice.lang + ')'
      : 'אזהרה: לא נמצא קול עברי!';
  };
  if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = load;
  load();
}

function test(text, btn) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if (heVoice) u.voice = heVoice;
  u.lang = 'he-IL';
  u.rate = 0.8;
  u.pitch = 1.1;
  u.volume = 1;
  fire(u, text, btn);
}

function testSSML(ssml, btn) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(ssml);
  if (heVoice) u.voice = heVoice;
  u.lang = 'he-IL';
  u.rate = 0.8;
  u.volume = 1;
  fire(u, ssml, btn);
}

function testWithVoice(text, voice, btn) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.voice = voice;
  u.lang = voice.lang;
  u.rate = 0.8;
  u.pitch = 1.1;
  u.volume = 1;
  fire(u, text + ' [' + voice.name + ']', btn);
}

function fire(u, label, btn) {
  document.querySelectorAll('.btn').forEach(b => b.style.background = '');
  btn.style.background = '#dbeafe';
  document.getElementById('status').textContent = 'מדבר: "' + label + '"';
  u.onend = () => { document.getElementById('status').textContent = 'סיים: "' + label + '" — האם נשמע במלרע?'; };
  speechSynthesis.speak(u);
}

initVoice();
</script>
</body>
</html>
